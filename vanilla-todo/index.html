<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraTodo - Vanilla JS</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glass-bg-container">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
  </div>

  <main class="app-container">
    <!-- Header Section -->
    <header class="app-header">
      <div class="logo-area">
        <span class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
          </svg>
        </span>
        <div class="logo-text">
          <h1>AuraTodo</h1>
          <p>Elevate your daily productivity</p>
        </div>
      </div>
      
      <!-- Stats Dashboard Card -->
      <div class="stats-card">
        <div class="stats-info">
          <div class="stats-text-block">
            <span class="stats-label">Completion Progress</span>
            <span id="stats-counter" class="stats-counter">0/0 Tasks</span>
          </div>
          <span id="stats-percentage" class="stats-percentage">0%</span>
        </div>
        <div class="progress-bar-container">
          <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
        </div>
      </div>
    </header>

    <!-- Content Card -->
    <section class="todo-card">
      <!-- Input Form -->
      <form id="todo-form" class="todo-form">
        <div class="input-wrapper">
          <input 
            type="text" 
            id="todo-input" 
            placeholder="What needs to be done?" 
            required 
            autocomplete="off"
            maxlength="100"
          >
          <div class="input-actions">
            <!-- Priority Selector -->
            <div class="priority-select-wrapper">
              <select id="todo-priority" class="priority-select" title="Priority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <!-- Add Button -->
            <button type="submit" class="btn-submit" aria-label="Add Task">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
              </svg>
            </button>
          </div>
        </div>
      </form>

      <!-- Controls (Filter & Operations) -->
      <div class="todo-controls">
        <div class="filter-tabs">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="active">Active</button>
          <button type="button" class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button type="button" id="clear-completed" class="btn-clear-completed" disabled>
          Clear Completed
        </button>
      </div>

      <!-- Todo List Container -->
      <div class="list-wrapper">
        <ul id="todo-list" class="todo-list">
          <!-- Dynamically filled -->
        </ul>
        
        <!-- Empty State View -->
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-.621-.504-1.125-1.125-1.125H9.75M8.25 21h8.25c1.24 0 2.25-1.01 2.25-2.25V5.25c0-1.24-1.01-2.25-2.25-2.25H8.25C7.01 3 6 4.01 6 5.25v13.5C6 19.99 7.01 21 8.25 21z" />
            </svg>
          </div>
          <h3>All caught up!</h3>
          <p>Add some tasks to start organizing your day.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
